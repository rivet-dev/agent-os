[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyodide-httpfs"
version = "0.1.0"
description = "fsspec-compatible HTTPS/S3 filesystem for DuckDB inside Pyodide. Reads byte ranges synchronously from sync Python via a SharedArrayBuffer + side-worker bridge installed by the host JS environment."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "agent-os" }]
requires-python = ">=3.10"
dependencies = [
  "fsspec>=2024.0",
]

[project.urls]
Homepage = "https://github.com/layerrai/agent-os"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
